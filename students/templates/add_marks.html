<!DOCTYPE html>
<html>
<head>

<title>Add Test Marks</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
}

.container{
width:500px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#07142f;
}

select,input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#2747c7;
color:white;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#07142f;
}

</style>

</head>

<body>

<div class="container">

<h1>Add Test Marks</h1>

<form method="POST">

{% csrf_token %}

<select name="student">

{% for student in students %}

<option value="{{ student.id }}">
{{ student.name }} - {{ student.roll_no }}
</option>

{% endfor %}

</select>

<input
type="text"
name="subject"
placeholder="Subject"
required>

<input
type="number"
name="marks"
placeholder="Marks"
required>

<button type="submit">
Save Marks
</button>

</form>

</div>

</body>
</html>
