<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gurukul Classes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BODY */
body{
    background:linear-gradient(135deg,#07142f,#2747c7);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* NAVBAR */
.navbar{
    width:100%;
    background:#07142f;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    left:0;
}

.navbar h2{
    color:white;
    font-size:18px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:15px;
    font-size:14px;
    padding:8px 12px;
    border-radius:5px;
    transition:0.3s;
}

.navbar a:hover{
    background:#2747c7;
}

/* MAIN CARD */
.container{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
    margin-top:80px;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid #2747c7;
    margin-bottom:20px;
}

h1{
    color:#07142f;
    margin-bottom:10px;
}

p{
    color:gray;
    margin-bottom:25px;
}

/* BUTTONS */
.btn{
    display:block;
    width:100%;
    text-decoration:none;
    background:#2747c7;
    color:white;
    padding:15px;
    margin:12px 0;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#07142f;
    transform:scale(1.03);
}

/* FOOTER */
.footer{
    margin-top:20px;
    color:white;
    font-size:13px;
    text-align:center;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Gurukul Classes</h2>

    <div>
        <a href="/">Home</a>
        <a href="/about/">About Us</a>
        <a href="/contact/">Contact Us</a>
    </div>
</div>

<!-- MAIN BOX -->
<div class="container">

    <img class="logo"
    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSPO2C_60H439AKzvgot2uvPBQ5oEb0SrEFYw&s"
    alt="Logo">

    <h1>Gurukul Classes</h1>

    <p>Select Your Portal</p>

    <a href="/student/register/" class="btn">
        👨‍🎓 Student Registration
    </a>

    <a href="/teacher/login/" class="btn">
        👨‍🏫 Teacher Login
    </a>

    <a href="/about/" class="btn">
        📘 About Us
    </a>

    <a href="/contact/" class="btn">
        📞 Contact Us
    </a>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Gurukul Classes Biraul | All Rights Reserved
</div>

</body>
</html>
