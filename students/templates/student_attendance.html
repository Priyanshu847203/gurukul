<!DOCTYPE html>
<html>
<head>
<title>Student Attendance</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Arial', sans-serif;
}

/* BACKGROUND */
body{
    background:linear-gradient(135deg,#07142f,#2747c7);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN CARD */
.card{
    background:white;
    width:380px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    text-align:center;
    animation:fadeIn 0.5s ease-in-out;
}

/* TITLE */
.card h2{
    color:#07142f;
    margin-bottom:20px;
}

/* DATE BOX */
.date{
    font-size:14px;
    color:#555;
    margin-bottom:15px;
}

/* SELECT */
select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    outline:none;
    margin-bottom:15px;
    transition:0.3s;
}

select:focus{
    border-color:#2747c7;
    box-shadow:0 0 8px rgba(39,71,199,0.3);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2747c7;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#07142f;
    transform:scale(1.02);
}

/* SUCCESS MESSAGE */
.success{
    color:green;
    margin-bottom:10px;
    font-weight:bold;
}

/* ERROR MESSAGE */
.error{
    color:red;
    margin-bottom:10px;
    font-weight:bold;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* SMALL SCREEN */
@media(max-width:420px){
    .card{
        width:90%;
    }
}

</style>

</head>

<body>

<div class="card">

    <h2>📅 Mark Attendance</h2>

    <div class="date">
        Today: {% now "d M Y" %}
    </div>

    {% if message %}
        <div class="success">{{ message }}</div>
    {% endif %}

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <select name="status" required>
            <option value="">Select Status</option>
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
        </select>

        <button type="submit">Submit Attendance</button>
    </form>

</div>

</body>
</html>
