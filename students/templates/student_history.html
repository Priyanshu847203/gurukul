<!DOCTYPE html>
<html>
<head>
    <title>Attendance History</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f5f5f5;
        }

        h1{
            background:#07142f;
            color:white;
            text-align:center;
            padding:20px;
        }

        table{
            width:80%;
            margin:40px auto;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ccc;
            padding:15px;
            text-align:center;
        }

        th{
            background:#2747c7;
            color:white;
        }

        a{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            font-size:20px;
        }

    </style>

</head>

<body>

<h1>Attendance History</h1>

<table>

<tr>
    <th>Date</th>
    <th>Status</th>
</tr>

{% for i in attendance %}

<tr>
    <td>{{ i.date }}</td>
    <td>{{ i.status }}</td>
</tr>

{% endfor %}

</table>

<a href="/student/dashboard/">
    Back to Dashboard
</a>

</body>
</html>
