<!DOCTYPE html>
<html>
<head>

<title>Student Performance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
}

.header{
background:#07142f;
color:white;
padding:20px;
text-align:center;
}

.container{
width:500px;
margin:40px auto;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,.2);
text-align:center;
}

h2{
margin:20px 0;
color:#2747c7;
}

.btn{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#2747c7;
color:white;
text-decoration:none;
border-radius:5px;
}

.btn:hover{
background:#07142f;
}

</style>

</head>

<body>

<div class="header">

<h1>Student Performance</h1>

</div>

<div class="container">

<div class="card">

<h2>Total Subjects : {{ total_subject }}</h2>

<h2>Total Marks : {{ total_marks }}</h2>

<h2>Percentage : {{ percentage }}%</h2>

<a href="{% url 'student_dashboard' %}" class="btn">
Back
</a>

</div>

</div>

</body>
</html>
