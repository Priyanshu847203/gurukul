<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#07142f,#2747c7);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:450px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#07142f;
        }

        input,select{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        .btn{
            width:100%;
            padding:14px;
            background:#2747c7;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            margin-top:10px;
        }

        .btn:hover{
            background:#07142f;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

        a{
            text-decoration:none;
            color:#2747c7;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Student Registration</h1>

{% if error %}
<p style="color:red; text-align:center;">
    {{ error }}
</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Full Name">

    <input type="text" name="father_name" placeholder="Father Name">

    <input type="text" name="roll_no" placeholder="Roll Number">

    <input type="email" name="email" placeholder="Email Address">

    <input type="text" name="mobile" placeholder="Mobile Number">

    <select name="course">
        <option>Class 10</option>
        <option>Class 12</option>
        <option>JEE</option>
        <option>NEET</option>
        <option>BCA</option>
    </select>

    <input type="password" name="password" placeholder="Create Password">

    <button type="submit" class="btn">
        Register
    </button>

</form>
  

    <p>
        Already Registered?
        <a href="/student/login/">
            Login Here
        </a>
    </p>

</div>

</body>
</html>
