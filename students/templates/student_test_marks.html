<!DOCTYPE html>
<html>
<head>

<title>My Test Marks</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
}

.header{
background:#07142f;
color:white;
text-align:center;
padding:20px;
}

.container{
width:80%;
margin:30px auto;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0px 5px 15px rgba(0,0,0,.2);
}

th{
background:#2747c7;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f5f5f5;
}

.btn{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#2747c7;
color:white;
text-decoration:none;
border-radius:5px;
}

.btn:hover{
background:#07142f;
}

</style>

</head>

<body>

<div class="header">

<h1>My Test Marks</h1>

</div>

<div class="container">

<table>

<tr>

<th>Subject</th>
<th>Marks</th>

</tr>

{% for m in marks %}

<tr>

<td>{{ m.subject }}</td>

<td>{{ m.marks }}</td>

</tr>

{% empty %}

<tr>

<td colspan="2">
No Marks Available
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="{% url 'student_dashboard' %}" class="btn">
Back to Dashboard
</a>

</div>

</body>
</html>
